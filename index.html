<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тренажёр «Я-сообщения» — учимся говорить без обид</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px 30px 30px;
            transition: all 0.3s;
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 small {
            font-size: 0.9rem;
            background: #eef2ff;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: normal;
            color: #2a5298;
        }

        .formula-card {
            background: #e9f0ff;
            border-left: 8px solid #ff9800;
            padding: 12px 20px;
            border-radius: 32px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            color: #2c3e66;
        }

        .formula-card span {
            background: white;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            margin: 5px 3px;
        }

        .situation-box {
            background: #f8f9ff;
            border-radius: 48px;
            padding: 25px 20px;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #cddcff;
        }

        .situation-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0b2b4f;
            background: #fff;
            padding: 20px;
            border-radius: 40px;
            margin: 10px 0;
            line-height: 1.4;
        }

        .options-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 25px 0 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid #bdd4ff;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            text-align: left;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            color: #1e3c72;
            line-height: 1.4;
        }

        .option-btn:hover {
            background: #eef3ff;
            border-color: #2a5298;
            transform: scale(1.01);
        }

        .option-btn.correct-highlight {
            background: #c8e6d9;
            border-color: #2e7d32;
            color: #1b5e20;
        }

        .option-btn.wrong-highlight {
            background: #ffcdd2;
            border-color: #c62828;
            color: #b71c1c;
            text-decoration: line-through;
        }

        .feedback {
            background: #fff9e0;
            border-radius: 28px;
            padding: 15px 20px;
            margin: 20px 0;
            font-size: 1.1rem;
            border-left: 8px solid #ffb74d;
        }

        .score-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            border-top: 2px dashed #cbd5e1;
            padding-top: 20px;
        }

        .score {
            font-size: 1.6rem;
            font-weight: bold;
            background: #2a5298;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
        }

        .next-btn {
            background: #ff9800;
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #b45f06;
        }

        .next-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b45f06;
        }

        .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .restart-btn {
            background: #e0e7ff;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e3c72;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #5a6e8a;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
        }

        @media (max-width: 700px) {
            .game-container { padding: 15px; }
            .situation-text { font-size: 1.2rem; }
            .option-btn { font-size: 0.9rem; padding: 12px 16px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>
        🗣️ Тренажёр «Я-сообщение»
        <small>говори о чувствах, не обвиняй</small>
    </h1>
    <div class="formula-card">
        📌 Формула: <span>«Когда ты…</span> <span>я чувствую…</span> <span>потому что…</span> <span>мне бы хотелось…»</span>
    </div>

    <div class="situation-box">
        <div style="font-weight: bold; color: #1e3c72;">🔹 СИТУАЦИЯ 🔹</div>
        <div class="situation-text" id="situationText">Загрузка...</div>
    </div>

    <div class="options-area" id="optionsContainer"></div>

    <div id="feedbackBox" class="feedback" style="display: none;"></div>

    <div class="score-area">
        <div class="score">⭐ Счёт: <span id="scoreValue">0</span> / <span id="totalQuestions">0</span></div>
        <div>
            <button class="restart-btn" id="restartBtn">🔄 Начать заново</button>
            <button class="next-btn" id="nextBtn" disabled>➡️ Следующая ситуация</button>
        </div>
    </div>
    <footer>
        © narven_olgui | Тренажёр для отработки «Я-сообщений» в групповой работе
    </footer>
</div>

<script>
    // 12 ситуаций с вариантами (правильный ответ — всегда я-сообщение)
    const rawQuestions = [
        {
            situation: "Друг без спроса взял твою новую куртку и порвал её. Ты внутри кипишь от злости.",
            options: [
                "Ты идиот! Зачем трогал мои вещи?!",
                "Когда ты берёшь мои вещи без спроса и портишь их, я чувствую злость и обиду, потому что куртка была мне дорога. Мне бы хотелось, чтобы ты спрашивал разрешения и был аккуратнее.",
                "Ладно, ничего страшного, не переживай (но внутри обида).",
                "Я больше никогда с тобой не дружу, ты мне всё испортил!"
            ],
            correctIndex: 1
        },
        {
            situation: "На уроке физкультуры тебя постоянно не выбирают в команду. Тебе обидно и одиноко.",
            options: [
                "Вы все козлы, не буду с вами играть!",
                "Когда меня не берут в игру, я чувствую себя ненужным и грустным, потому что я тоже хочу быть частью команды. Мне бы хотелось, чтобы вы дали мне шанс.",
                "Пойду посижу в сторонке, всё равно вы меня не видите.",
                "Плевать, я и сам не хочу играть с вами."
            ],
            correctIndex: 1
        },
        {
            situation: "Старший брат (или друг) постоянно громко слушает музыку, когда ты делаешь домашку. На просьбы сделать тише – не реагирует.",
            options: [
                "Ты глухой?! Выключи сейчас же!",
                "Когда ты включаешь музыку так громко, пока я занимаюсь, я чувствую раздражение и усталость, потому что мне сложно сосредоточиться. Мне бы хотелось договориться о времени, когда можно слушать громко.",
                "Ничего, потерплю, он старше.",
                "Я пожалуюсь родителям, тебе влетит."
            ],
            correctIndex: 1
        },
        {
            situation: "Одноклассники смеются над твоим ответом у доски. Тебе стыдно и больно.",
            options: [
                "Заткнитесь, вы сами ничего не знаете!",
                "Когда вы смеётесь надо мной перед всем классом, я чувствую унижение и страх, потому что я старался ответить правильно. Мне бы хотелось, чтобы вы уважали мои попытки.",
                "Уйду с урока, мне всё равно.",
                "Смейтесь, я привык(ла)."
            ],
            correctIndex: 1
        },
        {
            situation: "Ты выложил своё творчество в сеть, а в комментариях кто-то пишет грубость про твою внешность.",
            options: [
                "Сам ты страшный, иди в бан!",
                "Когда я читаю такие комментарии, я чувствую обиду и злость, потому что я делился тем, что мне дорого. Мне бы хотелось получать честную, но добрую обратную связь.",
                "Удалю всё, больше не буду ничего выкладывать.",
                "Плевать, пусть пишут, мне всё равно."
            ],
            correctIndex: 1
        },
        {
            situation: "Учитель на весь класс сказал, что ты бездарь, потому что не смог решить задачу. Ты старался, но волновался.",
            options: [
                "Вы несправедливы! Я учил! (кричит)",
                "Когда меня так оценивают при всех, я чувствую стыд и обиду, потому что я правда старался. Мне бы хотелось обсудить это наедине и получить шанс исправиться.",
                "Промолчу, но весь день буду злиться.",
                "Учитель дурак, больше ничего не буду учить."
            ],
            correctIndex: 1
        },
        {
            situation: "Друзья уговаривают тебя залезть на крышу поезда (зацепинг), называют трусом. Ты не хочешь рисковать жизнью.",
            options: [
                "Ладно, пойду, чтобы не считали трусом.",
                "Когда вы меня уговариваете на опасные вещи и называете трусом, я чувствую давление и злость, потому что моя безопасность важнее чужого мнения. Мне бы хотелось, чтобы вы уважали мой отказ и мы нашли другое, безопасное приключение.",
                "Отвалите, я сам решаю.",
                "Вы дураки, я с вами больше не дружу."
            ],
            correctIndex: 1
        },
        {
            situation: "Твой парень/девушка постоянно смотрит в телефон, когда вы вместе. Тебе кажется, что тебя игнорируют.",
            options: [
                "Ты меня вообще не любишь, только телефон и видишь!",
                "Когда ты смотришь в телефон, пока мы вместе, я чувствую одиночество и ревность, потому что мне важно наше общение. Мне бы хотелось, чтобы мы договаривались о времени без гаджетов.",
                "Ладно, я тоже сяду в телефон.",
                "Ничего не скажу, просто обижусь."
            ],
            correctIndex: 1
        },
        {
            situation: "Ты опоздал на встречу с другом из-за пробок, а он накричал на тебя при всех.",
            options: [
                "Ты что орёшь? Сам вечно опаздываешь!",
                "Когда ты кричишь на меня при людях, я чувствую стыд и обиду, потому что я правда не хотел опаздывать. Мне бы хотелось, чтобы мы обсудили это спокойно, без свидетелей.",
                "Извини, я больше не буду опаздывать.",
                "Ну и ладно, не нужна мне такая дружба."
            ],
            correctIndex: 1
        },
        {
            situation: "Родители сравнивают тебя с отличником из класса, говорят, что ты мог бы лучше учиться. Тебе обидно.",
            options: [
                "Да отстаньте вы со своим отличником!",
                "Когда вы меня сравниваете с другими, я чувствую себя неудачником и злость, потому что я стараюсь по-своему. Мне бы хотелось, чтобы вы замечали мои успехи, а не только недостатки.",
                "Молчу, уйду в свою комнату.",
                "Вы меня не любите, я всё понял."
            ],
            correctIndex: 1
        },
        {
            situation: "Ты участвуешь в школьном конкурсе, а группа одноклассников громко обсуждает, что ты точно проиграешь. Тебе слышно.",
            options: [
                "Заткнитесь, завистники!",
                "Когда я слышу, как вы говорите, что я проиграю, я чувствую неуверенность и обиду, потому что я очень стараюсь. Мне бы хотелось, чтобы вы меня поддерживали, даже если не верите в успех.",
                "Ничего, я докажу.",
                "Пойду и снимусь с конкурса."
            ],
            correctIndex: 1
        },
        {
            situation: "Твой друг постоянно перебивает тебя, не даёт закончить мысль. Тебе надоело.",
            options: [
                "Дай договорить, какой ты невоспитанный!",
                "Когда ты меня перебиваешь, я чувствую раздражение и усталость, потому что мне важно, чтобы меня выслушали. Мне бы хотелось, чтобы мы говорили по очереди.",
                "Ничего, перебью и я.",
                "Ладно, молчи, всё равно тебе не интересно."
            ],
            correctIndex: 1
        }
    ];

    // Функция для случайного перемешивания массива (Фишер-Йетс)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Подготовка вопросов: для каждого создаём копию вариантов и перемешиваем,
    // запоминая правильный индекс в новом массиве
    const questions = rawQuestions.map(q => {
        const shuffledOptions = shuffleArray([...q.options]);
        const newCorrectIndex = shuffledOptions.findIndex(opt => opt === q.options[q.correctIndex]);
        return {
            situation: q.situation,
            options: shuffledOptions,
            correctIndex: newCorrectIndex
        };
    });

    let currentIndex = 0;
    let score = 0;
    let answered = false;
    const totalQuestions = questions.length;

    // DOM элементы
    const situationEl = document.getElementById('situationText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackBox = document.getElementById('feedbackBox');
    const scoreSpan = document.getElementById('scoreValue');
    const totalSpan = document.getElementById('totalQuestions');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');

    function updateScoreUI() {
        scoreSpan.textContent = score;
        totalSpan.textContent = totalQuestions;
    }

    function renderCurrentQuestion() {
        const q = questions[currentIndex];
        situationEl.textContent = q.situation;

        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.dataset.index = idx;
            btn.addEventListener('click', () => handleAnswer(idx, btn));
            optionsContainer.appendChild(btn);
        });

        feedbackBox.style.display = 'none';
        feedbackBox.innerHTML = '';
        nextBtn.disabled = true;
        answered = false;
        // удаляем старые подсветки
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.classList.remove('correct-highlight', 'wrong-highlight');
        });
    }

    function handleAnswer(selectedIdx, btnElement) {
        if (answered) return;

        const currentQ = questions[currentIndex];
        const isCorrect = (selectedIdx === currentQ.correctIndex);
        if (isCorrect) {
            score++;
            updateScoreUI();
        }

        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach((btn, idx) => {
            if (idx === currentQ.correctIndex) {
                btn.classList.add('correct-highlight');
            }
            if (idx === selectedIdx && idx !== currentQ.correctIndex) {
                btn.classList.add('wrong-highlight');
            }
        });

        let feedbackHtml = '';
        if (isCorrect) {
            feedbackHtml = `✅ <strong>Верно!</strong> Ты использовал(а) Я-сообщение — говоришь о чувствах, не обвиняя.<br>🎯 «${currentQ.options[currentQ.correctIndex]}»`;
        } else {
            feedbackHtml = `❌ <strong>Не совсем.</strong> Лучше сказать о своих чувствах, не обвиняя.<br>📌 Правильное Я-сообщение:<br>«${currentQ.options[currentQ.correctIndex]}»`;
        }
        feedbackBox.innerHTML = feedbackHtml;
        feedbackBox.style.display = 'block';

        answered = true;
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        if (!answered) return;
        if (currentIndex + 1 < totalQuestions) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            // игра окончена
            situationEl.textContent = "🏆 Отлично! Ты справился(лась) со всеми ситуациями! 🏆";
            optionsContainer.innerHTML = '<div style="text-align:center; padding:20px;">Молодец! Теперь ты лучше знаешь, как строить Я-сообщения.</div>';
            feedbackBox.style.display = 'none';
            nextBtn.disabled = true;
            const finalDiv = document.getElementById('finalScoreMsg');
            if (!finalDiv) {
                const finalMessage = document.createElement('div');
                finalMessage.id = 'finalScoreMsg';
                finalMessage.className = 'feedback';
                finalMessage.style.marginTop = '15px';
                finalMessage.innerHTML = `🎉 Твой результат: ${score} из ${totalQuestions}. 🎉<br>Помни: «Я-сообщение» помогает сохранить отношения и выразить чувства без агрессии.`;
                optionsContainer.after(finalMessage);
            }
        }
    }

    function restartGame() {
        currentIndex = 0;
        score = 0;
        answered = false;
        updateScoreUI();
        const finalDiv = document.getElementById('finalScoreMsg');
        if (finalDiv) finalDiv.remove();
        renderCurrentQuestion();
    }

    // инициализация
    updateScoreUI();
    renderCurrentQuestion();

    nextBtn.addEventListener('click', nextQuestion);
    restartBtn.addEventListener('click', restartGame);
</script>
</body>
</html>
